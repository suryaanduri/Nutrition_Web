<article
  class="group rounded-[18px] border bg-white px-3.5 py-3 shadow-sm transition duration-200 hover:-translate-y-0.5 hover:shadow-md"
  [ngClass]="{
    'border-[rgba(36,122,82,0.18)] ring-1 ring-[rgba(36,122,82,0.08)] bg-[linear-gradient(180deg,#ffffff_0%,#f4fbf7_100%)]':
      selected(),
    'border-[rgba(183,121,31,0.18)] ring-1 ring-[rgba(183,121,31,0.08)] bg-[linear-gradient(180deg,#ffffff_0%,#fffbf4_100%)]':
      !selected() && conversation().status === 'Needs attention',
    'border-[color:var(--ncm-border)] hover:border-[rgba(36,122,82,0.18)]':
      !selected() && conversation().status !== 'Needs attention'
  }"
>
  <div class="flex items-start gap-3">
    <div
      class="flex h-10 w-10 shrink-0 items-center justify-center rounded-full bg-[var(--ncm-primary-soft)] text-sm font-bold text-[var(--ncm-primary-strong)]"
    >
      {{ conversation().memberName.charAt(0) }}
    </div>

    <div class="min-w-0 flex-1">
      <div class="flex items-start justify-between gap-3">
        <div class="min-w-0">
          <div class="flex flex-wrap items-center gap-2">
            <h4 class="truncate text-sm font-bold tracking-[-0.02em] text-[var(--ncm-text)]">
              {{ conversation().memberName }}
            </h4>
            <span
              class="inline-flex items-center rounded-full px-2 py-0.5 text-[10px] font-semibold"
              [ngClass]="statusClass(conversation().status)"
            >
              {{ conversation().status }}
            </span>
          </div>
          <p class="mt-1 truncate text-xs text-[var(--ncm-text-soft)]">
            {{ conversation().memberGoal }}
          </p>
        </div>

        <div class="flex flex-col items-end gap-1">
          <span class="text-[10px] font-semibold text-[var(--ncm-text-soft)]">
            {{ conversation().timestamp }}
          </span>
          @if (conversation().unreadCount > 0) {
            <span
              class="inline-flex min-w-5 items-center justify-center rounded-full bg-[var(--ncm-primary)] px-1.5 py-0.5 text-[10px] font-semibold text-white"
            >
              {{ conversation().unreadCount }}
            </span>
          }
        </div>
      </div>

      <p
        class="mt-2 line-clamp-1 text-[13px] leading-5"
        [ngClass]="{
          'font-medium text-[var(--ncm-text)]': conversation().unreadCount > 0,
          'text-[var(--ncm-text-muted)]': conversation().unreadCount === 0
        }"
      >
        {{ conversation().lastMessagePreview }}
      </p>
    </div>
  </div>
</article>
